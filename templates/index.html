{% extends "base.html" %}

{% block json_ld %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Karaoke Lover",
  "url": "https://www.karaokelover.com",
  "description": "Free online karaoke — search millions of songs, sing along with lyrics, and play instantly. No downloads, no sign-up required.",
  "potentialAction": {
    "@type": "SearchAction",
    "target": {
      "@type": "EntryPoint",
      "urlTemplate": "https://www.karaokelover.com/?q={search_term_string}"
    },
    "query-input": "required name=search_term_string"
  }
}
</script>
{% endblock %}

{% block auto_search %}
<script>
  (function () {
    var q = new URLSearchParams(window.location.search).get('q');
    if (q) {
      window.addEventListener('DOMContentLoaded', function () {
        var input = document.getElementById('searchInput');
        var form = document.getElementById('searchForm');
        if (input && form) {
          input.value = decodeURIComponent(q);
          setTimeout(function () { form.dispatchEvent(new Event('submit')); }, 300);
        }
      });
    }
  })();
</script>
{% endblock %}
